name: coralstack

# Comment out any service you don't want to run. Caddy is required; it's the
# TLS boundary and subdomain router for everything else.
include:
  - services/pocket-id/docker-compose.yml
  - services/vaultwarden/docker-compose.yml
  - services/immich/docker-compose.yml
  - services/jellyfin/docker-compose.yml

# The project's default network is named `coralstack`. Every service in this
# compose (and every included compose) lands on it automatically, so Caddy
# can reach upstream services by container name without per-service network
# declarations. Lets us include third-party compose files verbatim.
networks:
  default:
    name: coralstack

services:
  caddy:
    build: ./caddy
    image: coralstack/caddy:2.11.2-cloudflare
    # Custom-built image — don't try to pull it from a registry.
    pull_policy: build
    container_name: caddy
    restart: unless-stopped
    ports:
      - "443:443"
      - "443:443/udp"  # HTTP/3
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      CF_API_TOKEN: ${CF_API_TOKEN}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${DATA_PATH:?DATA_PATH must be set in .env — run ./setup.sh which resolves it to an absolute path}/caddy/data:/data
      - ${DATA_PATH:?DATA_PATH must be set in .env — run ./setup.sh which resolves it to an absolute path}/caddy/config:/config
    # Register every coralstack subdomain as a docker network alias on Caddy
    # so that inter-service calls using the public FQDN (e.g. Jellyfin's SSO
    # plugin calling id.${BASE_DOMAIN}/.well-known/openid-configuration)
    # resolve internally to Caddy via Docker's embedded DNS instead of going
    # out through eero's hairpin NAT. Caddy still routes by SNI to the right
    # upstream; LE certs still valid because hostnames match.
    #
    # When adding a new subdomain to the Caddyfile, also add it here.
    networks:
      default:
        aliases:
          - ${BASE_DOMAIN}
          - id.${BASE_DOMAIN}
          - vault.${BASE_DOMAIN}
          - media.${BASE_DOMAIN}
          - photos.${BASE_DOMAIN}
