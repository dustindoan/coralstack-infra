name: coralstack

# Comment out any service you don't want to run. Caddy is required; it's the
# TLS boundary and subdomain router for everything else.
include:
  - services/pocket-id/docker-compose.yml
  - services/vaultwarden/docker-compose.yml
  - services/immich/docker-compose.yml
  - services/jellyfin/docker-compose.yml

# The project's default network is named `coralstack`. Every service in this
# compose (and every included compose) lands on it automatically, so Caddy
# can reach upstream services by container name without per-service network
# declarations. Lets us include third-party compose files verbatim.
networks:
  default:
    name: coralstack

services:
  caddy:
    build: ./caddy
    image: coralstack/caddy:2.11.2-cloudflare
    # Custom-built image — don't try to pull it from a registry.
    pull_policy: build
    container_name: caddy
    restart: unless-stopped
    ports:
      - "443:443"
      - "443:443/udp"  # HTTP/3
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      CF_API_TOKEN: ${CF_API_TOKEN}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${DATA_PATH:-./data}/caddy/data:/data
      - ${DATA_PATH:-./data}/caddy/config:/config
