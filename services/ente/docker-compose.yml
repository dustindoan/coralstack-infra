# Ente Photos overlay.
#
# Structure mirrors ente-io/ente@ecf5325:server/quickstart.sh, the production-
# shaped recipe Ente publishes for self-hosters. We don't `include:` Ente's
# server/compose.yaml because that file is explicitly "Sample docker compose
# file, not meant for production use" — it builds from local context with
# hardcoded credentials and can't be consumed downstream as-is.
#
# When bumping image versions, diff against the latest quickstart.sh first to
# catch upstream shape changes (especially likely if Ente migrates off MinIO
# post-archival).
#
# Reference: https://github.com/ente-io/ente/blob/ecf5325/server/quickstart.sh

services:
  ente-museum:
    image: ghcr.io/ente-io/server:${ENTE_SERVER_VERSION}
    container_name: ente-museum
    restart: unless-stopped
    depends_on:
      ente-postgres:
        condition: service_healthy
    volumes:
      # museum.yaml is generated by setup.sh from .env values into DATA_PATH;
      # mount read-only so the container can't accidentally rewrite it.
      - ${DATA_PATH:?DATA_PATH must be set in .env — run ./setup.sh which resolves it to an absolute path}/ente/museum.yaml:/museum.yaml:ro
      - ${DATA_PATH:?DATA_PATH must be set in .env — run ./setup.sh which resolves it to an absolute path}/ente/museum-data:/data:ro
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/ping"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 5s

  # Bridges localhost:3200 inside ente-museum's network namespace to ente-minio.
  # Museum's S3 client targets localhost:3200 (matching Ente prod where each
  # bucket has its own real endpoint); socat makes that resolve to MinIO. Don't
  # drop this — without it museum's S3 ops get connection-refused.
  ente-socat:
    image: alpine/socat
    container_name: ente-socat
    restart: unless-stopped
    network_mode: service:ente-museum
    depends_on: [ente-museum]
    command: "TCP-LISTEN:3200,fork,reuseaddr TCP:ente-minio:3200"

  # The web image bundles photos (3000), accounts (3001), albums (3002),
  # auth (3003), and cast (3004). Caddy routes a subdomain to each port we
  # expose to members. Cast is deferred — no Caddy route for it during trial.
  ente-web:
    image: ghcr.io/ente-io/web:${ENTE_WEB_VERSION}
    container_name: ente-web
    restart: unless-stopped
    environment:
      ENTE_API_ORIGIN: https://photos-api.${BASE_DOMAIN}
      ENTE_ALBUMS_ORIGIN: https://photos-albums.${BASE_DOMAIN}

  ente-postgres:
    image: postgres:15
    container_name: ente-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ente
      POSTGRES_PASSWORD: ${ENTE_DB_PASSWORD}
      POSTGRES_DB: ente_db
    healthcheck:
      test: pg_isready -q -d ente_db -U ente
      start_period: 40s
      start_interval: 1s
    volumes:
      - ${DATA_PATH:?DATA_PATH must be set in .env — run ./setup.sh which resolves it to an absolute path}/ente/postgres:/var/lib/postgresql/data

  ente-minio:
    image: minio/minio
    container_name: ente-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${ENTE_MINIO_USER}
      MINIO_ROOT_PASSWORD: ${ENTE_MINIO_PASSWORD}
    command: server /data --address ":3200" --console-address ":3201"
    volumes:
      # Photo blobs land on STORAGE_PATH (USB-attached storage), not DATA_PATH
      # (root FS). Fail-closed mount-point pattern (chmod 000 the bare dir on
      # apps VM) ensures services error rather than fill root FS if storage
      # disappears — see project memory project_coralstack_mount_failclosed.
      - ${STORAGE_PATH:?STORAGE_PATH must be set in .env}/ente-minio:/data
    post_start:
      # Three buckets matching Ente prod naming. Museum expects all three to
      # exist even on single-instance self-host; do not remove. mc creates
      # them as filesystem dirs under /data, which MinIO surfaces as buckets.
      - command: |
          sh -c '
          while ! mc alias set h0 http://ente-minio:3200 ${ENTE_MINIO_USER} ${ENTE_MINIO_PASSWORD} 2>/dev/null
          do
            echo "Waiting for minio..."
            sleep 0.5
          done

          cd /data
          mc mb -p b2-eu-cen
          mc mb -p wasabi-eu-central-2-v3
          mc mb -p scw-eu-fr-v3
          '
