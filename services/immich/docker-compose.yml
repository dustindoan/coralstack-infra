# Thin overlay on Immich's upstream compose.
#
# The upstream file is fetched by setup.sh from the pinned release URL and
# dropped at services/immich/upstream.yml. We inherit it verbatim — same
# postgres tag, same Valkey tag, same ML/server versions that Immich itself
# ships. Upgrading is a single version bump in setup.sh.
#
# No service overrides needed: the root docker-compose.yml maps the project's
# default network to `coralstack`, so all upstream services automatically
# land on the same network as Caddy.

include:
  - path: upstream.yml
