services:
  jellyfin:
    image: jellyfin/jellyfin:10.11.8
    container_name: jellyfin
    restart: unless-stopped
    # Docker's default nofile soft limit is 1024. A library scan over a few hundred
    # episodes fans out concurrent TheMovieDb + OMDb metadata fetches and blows
    # through that — EAGAIN on every new socket, Jellyfin's HTTP listener wedges,
    # Caddy returns ERR_EMPTY_RESPONSE to the browser. Container reports healthy
    # because the healthcheck holds an existing FD. Raise it.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # GPU hardware transcoding (Intel Quick Sync): this committed compose stays
    # portable (no GPU assumptions). On a host that has the iGPU passed through to
    # the VM, the /dev/dri device + render GID are added via a gitignored
    # docker-compose.override.yml at the repo root (auto-merged). Full procedure +
    # the override snippet: docs/GPU_TRANSCODING.md.
    environment:
      TZ: ${TZ}
      JELLYFIN_PublishedServerUrl: https://media.${BASE_DOMAIN}
    volumes:
      - ${DATA_PATH:?DATA_PATH must be set (run ./setup.sh which resolves it to an absolute path)}/jellyfin/config:/config
      - ${DATA_PATH}/jellyfin/cache:/cache
      # The music-ingest container (services/music) owns writes to the music
      # library via beets; Jellyfin reads it read-only
      - ${STORAGE_PATH}/music:/media/music:ro
      - ${STORAGE_PATH}/movies:/media/movies:ro
      - ${STORAGE_PATH}/shows:/media/shows:ro
