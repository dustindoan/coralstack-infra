# Music pipeline (see docs/MUSIC_ACQUISITION.md) — two cooperating services:
#   qobuz-poll   (front half) polls your Qobuz purchases and downloads new
#                ones into the staging folder, hands-off.
#   music-ingest (back half)  watches staging, imports drops into the library
#                with beets (tag / art / file); Jellyfin's real-time monitor
#                then surfaces them (no API key needed — local ext4 storage).
# Net effect: buy an album → it appears in Jellyfin a few minutes later.
#
# Other ways to feed staging (${STORAGE_PATH}/music-staging):
#   - Bandcamp lane: BandcampSync (future)
#   - Manual: run qobuz-fetch.py by hand, or scp/rsync anything you own in
#
# services/music/.env (gitignored) keys:
#   QOBUZ_TOKEN          — web-session API token (REQUIRED for qobuz-poll).
#                          Extract from a logged-in play.qobuz.com session;
#                          see docs/MUSIC_ACQUISITION.md. Refresh = update this
#                          + `docker compose up -d qobuz-poll`.
#   QOBUZ_POLL_INTERVAL  — seconds between polls (optional, default 900).
#   JELLYFIN_API_KEY     — optional; only to force an immediate scan on top of
#                          Jellyfin's real-time monitoring (usually unneeded).
#
# No ports, no Caddy entry: these containers have no UI (see ADMIN_ACCESS.md —
# network-only services are already unreachable from outside the stack).
services:
  # ── Front half: acquire ────────────────────────────────────────────────
  qobuz-poll:
    build:
      context: .
      dockerfile: Dockerfile.poll
    image: coralstack/qobuz-poll:streamrip-2.1.0
    # Custom-built image — don't try to pull it from a registry.
    pull_policy: build
    container_name: qobuz-poll
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      TZ: ${TZ}
      QOBUZ_DEST: /staging
      # Persistent watermark of fetched track IDs — survives staging being
      # drained by music-ingest, so re-polls never re-download.
      QOBUZ_STATE: /state/fetched.json
      QOBUZ_POLL_INTERVAL: ${QOBUZ_POLL_INTERVAL:-900}
    volumes:
      # Downloads land in the same staging folder music-ingest watches.
      - ${STORAGE_PATH:?STORAGE_PATH must be set in .env}/music-staging:/staging
      # Watermark state (survives container + restarts).
      - ${DATA_PATH:?DATA_PATH must be set in .env — run ./setup.sh}/music/qobuz-state:/state

  # ── Back half: ingest ──────────────────────────────────────────────────
  music-ingest:
    build: .
    image: coralstack/music-ingest:beets-2.12.0
    # Custom-built image — don't try to pull it from a registry.
    pull_policy: build
    container_name: music-ingest
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      TZ: ${TZ}
      JELLYFIN_URL: http://jellyfin:8096
    volumes:
      # The library. music-ingest is the ONLY writer (Jellyfin mounts it :ro).
      - ${STORAGE_PATH:?STORAGE_PATH must be set in .env}/music:/music
      # The watch folder. Same filesystem as /music so beets' move is atomic.
      - ${STORAGE_PATH}/music-staging:/staging
      # Mutable beets state (library.db, import.log).
      - ${DATA_PATH:?DATA_PATH must be set in .env — run ./setup.sh}/music/beets:/config
      # beets config, read-only from the repo.
      - ./beets-config.yaml:/etc/beets/config.yaml:ro
