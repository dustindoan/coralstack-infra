services:
  vaultwarden:
    # OIDCWarden — the Timshel fork maintained by the author of Vaultwarden's
    # merged SSO PR. We're on it because mainline's first-SSO-login flow is
    # broken (see vaultwarden#6316): new SSO users bounce back to the login
    # form instead of being prompted to set a master password. OIDCWarden
    # fixes that. Drop-in compatible with mainline Vaultwarden data dirs.
    image: timshel/oidcwarden:v2026.3.1-3-alpine
    container_name: vaultwarden
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DOMAIN: https://vault.${BASE_DOMAIN}
      SIGNUPS_ALLOWED: "false"  # flip true for initial account, then back to false
      INVITATIONS_ALLOWED: "true"
      WEBSOCKET_ENABLED: "true"
      ROCKET_PORT: "80"
      # SSO authority derived from root BASE_DOMAIN. Vars in env_file don't
      # get interpolation, so anything referencing ${BASE_DOMAIN} has to live
      # here in environment: rather than in services/vaultwarden/.env.
      SSO_AUTHORITY: https://id.${BASE_DOMAIN}
    volumes:
      - ${DATA_PATH:-../../data}/vaultwarden:/data
