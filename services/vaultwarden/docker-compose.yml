services:
  vaultwarden:
    image: vaultwarden/server:1.35.7-alpine
    container_name: vaultwarden
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DOMAIN: https://vault.${BASE_DOMAIN}
      SIGNUPS_ALLOWED: "false"  # flip true for initial account, then back to false
      INVITATIONS_ALLOWED: "true"
      WEBSOCKET_ENABLED: "true"
      ROCKET_PORT: "80"
    volumes:
      - ${DATA_PATH:-../../data}/vaultwarden:/data
    networks:
      - coralstack

networks:
  coralstack:
    name: coralstack
    external: true
